name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_central
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Lint
        run: ruff check app tests
      - name: Unit tests
        env:
          DATABASE_URL_CENTRAL: postgresql://postgres:postgres@localhost:5432/test_central
          REDIS_URL: redis://localhost:6379/0
          WHATSAPP_ACCESS_TOKEN: test
          WHATSAPP_PHONE_NUMBER_ID: test
          WHATSAPP_VERIFY_TOKEN: test
          GEMINI_API_KEY: test
          JWT_SECRET: test-secret
          FERNET_KEY: "Z0G8vP2mN5qR7tY1wX3zA6bC9dE0fG2hJ4kL6nM8pQ0="
          WEBHOOK_SIGNATURE_REQUIRED: "false"
          ENVIRONMENT: test
        run: pytest tests/ -v
